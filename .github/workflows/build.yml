name: Test Build

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        arch: x86_64
        target: x86-64

    uses: openwrt/actions-shared-workflows/.github/workflows/multi-arch-test-build.yml@main
    secrets: inherit
    env:
      ARCH: ${{ matrix.arch }}
      TARGET: ${{ matrix.target }}
